ai_usage_summary: |
  Used Google Gemini for architecture discussion and debugging. 
  All ranking logic, scoring weights, and honeypot detection were engineered
  and validated manually. No candidate data was fed to any external LLM during ranking.

methodology_summary: |
  Two-stage hybrid ranker. Stage 1: Node.js stream processor filters 100K candidates to 
  top 300 using a multi-factor heuristic (experience, location, 15+ behavioral signals, 
  career trajectory, education tier, honeypot detection). Stage 2: Local HuggingFace 
  all-MiniLM-L6-v2 embedding model generates dense vectors for candidate profiles and JD, 
  then cosine similarity produces the semantic score. Final rank = 40% semantic + 60% 
  behavioral. Reasoning references specific candidate facts and JD requirements. 
  Honeypots filtered via impossible-profile detection (expert+0mo, tenure mismatch). 
  Runtime: ~60 seconds total on CPU. No external API calls.

